name: vehicle
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.11.0
  google_sign_in: ^6.2.1
  firebase_auth: ^4.17.4
  firebase_core: ^2.25.4
  http: ^1.2.0
  permission_handler: ^11.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/asset/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - lib/asset/logo.png
    - lib/asset/icon.png
