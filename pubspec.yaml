name: vehicle
description: "Cyber1 TMS - Terminal Management System"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Networking
  http: ^1.2.0
  connectivity_plus: ^6.1.4

  # Local storage
  shared_preferences: ^2.3.5

  # Camera & OCR
  camera: ^0.11.0+2
  google_mlkit_text_recognition: ^0.11.0
  permission_handler: ^11.3.0
  image_picker: ^1.1.2

  # Firebase
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  google_sign_in: ^6.2.1

  # UI
  flutter_svg: ^2.0.17
  lottie: ^3.3.1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  flutter_spinkit:
  logger: ^2.5.0
  path_provider: ^2.1.5
  share_plus: ^10.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
